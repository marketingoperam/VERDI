# Render Blueprint: VERDI Operator Inbox
# Path: verdi-connector/render.yaml
#
# After first deploy, set TELEGRAM_API_HASH + TELEGRAM_SESSION_B64 in the
# Render dashboard (see DEPLOY_RENDER.md). Do not commit session files.

databases:
  - name: verdi-connector-db
    plan: free
    databaseName: verdi_connector
    user: verdi

services:
  - type: web
    name: verdi-connector-api
    runtime: docker
    plan: free
    rootDir: verdi-connector
    dockerfilePath: ./Dockerfile.api
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_SYNC_OUTBOX
        value: "true"
      - key: REPLY_ONLY
        value: "true"
      - key: TELEGRAM_USE_STUB
        value: "false"
      - key: TELEGRAM_SYNC_ON_START
        value: "true"
      - key: TELEGRAM_SESSION
        value: listener_main
      - key: TELEGRAM_API_ID
        value: "30268202"
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_SESSION_B64
        sync: false
      - key: TELEGRAM_PYTHON
        value: python3
      - key: TELEGRAM_WORKER_SCRIPT
        value: /opt/verdi/scripts/telegram_cloud_worker.py
      - key: TELEGRAM_SESSIONS_DIR
        value: /var/data/telegram-sessions
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: verdi-connector-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: SEED_OPERATOR_EMAIL
        value: andf1n@verdi.local
      - key: SEED_OPERATOR_PASSWORD
        value: admin123
      - key: SEED_OPERATOR_NAME
        value: "@andf1n"

  - type: web
    name: verdi-connector-web
    runtime: node
    plan: free
    rootDir: verdi-connector/apps/web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npx next start -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
